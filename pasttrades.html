<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Past Trades | PMS</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <nav class="nav">
      <div class="logo"></div>
      <ul class="nav-links">
        <li><a href="index.html">Dashboard</a></li>
<li><a href="trades.html">trades</a></li>
<li><a href="longterm.html">Long-Term</a></li>
<li><a href="mf.html">SIP</a></li>
<li><a class="active" href="pasttrades.html">Past-Trades</a></li>
<li><a href="analytics.html">Charts</a></li>
<li><a href="journal.html">✏️</a></li>
<li><a href="share_calculator.html">🧮</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <section class="page-hero card">
      <div>
        <h1>Past-Trades</h1>
        <p class="subtitle">Select type, choose record, verify qty/ltp, then exit.</p>
      </div>
      <div class="hero-badge">Historical Exit Book</div>
    </section>

    <section class="card section">
      <div id="pastTradeMetrics" class="summary-grid pasttrade-metrics"></div>
    </section>

    <section class="card section">
      <h3>Exit Position</h3>
      <form id="exitForm" class="form-grid" autocomplete="off">
        <label>Stock Type
          <select id="exitType" required>
            <option value="trades">Trade</option>
            <option value="longterm">Long Term</option>
            <option value="sip">SIP</option>
          </select>
        </label>
        <label>Select Record
          <select id="exitRecord" required></select>
        </label>
        <label>Qty
          <input id="selectedQty" type="text" readonly />
        </label>
        <label>LTP
          <input id="selectedLtp" type="text" readonly />
        </label>
        <label>Sold Price
          <input id="soldPrice" type="number" min="0.01" step="0.01" required />
        </label>
        <label>Holding Days
          <input id="holdingDays" type="number" min="0" step="1" required />
        </label>
        <button class="btn-primary" type="submit">Exit Selected</button>
      </form>
    </section>

    <section class="card section">
      <div class="toolbar"><h3>Script Filter</h3></div>
      <input id="pastTradeFilter" type="text" placeholder="Filter by search" />
      <div id="pastTradesAllocation"></div>
    </section>

    

    <section class="card section">
      <div class="toolbar"><h3>Exited Trades</h3></div>
      <div class="table-wrap">
        <table id="exitedTable">
          <thead>
            <tr><th>Type</th><th>Script</th><th>Buy</th><th>Sell</th><th>Total</th><th>Tax</th><th>Profit</th><th>Invested</th><th>Receivable</th><th>Holding Days</th><th>Actions</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script defer src="trade-math.js"></script>
  <script defer src="capital-manager.js"></script>
  <script type="module" src="firebase-sync.js"></script>
  <script defer src="data-recorder.js"></script>
  <script defer src="allocation.js"></script>
  <script defer src="pasttrades.js"></script>
</body>
</html>
