<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Past Trades | Portfolio Management System</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <nav class="nav">
      <div class="logo">Portfolio Management System</div>
      <ul class="nav-links">
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="trades.html">Trades</a></li>
        <li><a href="longterm.html">Long Term</a></li>
                <li><a class="active" href="pasttrades.html">Past Trades</a></li>
        <li><a href="journal.html">📚</a></li>
        <li><a href="share_calculator.html">🧮</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <h1>Past Trades Manager</h1>
    <p class="subtitle">Select type → select record → enter sold price and holding days → exit.</p>

    <section class="card section">
      <h3>Exit Position</h3>
      <form id="exitForm" class="form-grid" autocomplete="off">
        <label>Stock Type
          <select id="exitType" required>
            <option value="trades">Trade</option>
            <option value="longterm">Long Term</option>
                      </select>
        </label>
        <label>Select Record
          <select id="exitRecord" required></select>
        </label>
        <label>Sold Price
          <input id="soldPrice" type="number" min="0.01" step="0.01" required />
        </label>
        <label>Holding Days
          <input id="holdingDays" type="number" min="0" step="1" required />
        </label>
        <button class="btn-primary" type="submit">Exit Selected</button>
      </form>
    </section>

    <section class="card section">
      <h3>Exited Trades</h3>
      <div class="table-wrap">
        <table id="exitedTable">
          <thead>
            <tr><th>Type</th><th>Name</th><th>Buy</th><th>Sold</th><th>Profit</th><th>Per Day Profit</th><th>Holding Days</th><th>Actions</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="trade-math.js"></script>
  <script src="capital-manager.js"></script>
  <script type="module" src="firebase-sync.js"></script>
  <script src="data-recorder.js"></script>
  <script src="pasttrades.js"></script>
</body>
</html>
