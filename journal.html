<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Journal | Portfolio Management System</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="header">
    <nav class="nav">
      <div class="logo">Portfolio Management System</div>
      <ul class="nav-links">
        <li><a href="index.html">🏠 Dashboard</a></li>
        <li><a href="trades.html">📈 Trades</a></li>
        <li><a href="longterm.html">💼 Long-T</a></li>
        <li><a href="mf.html">💰 SIP</a></li>
        <li><a href="pasttrades.html">🧾 Past-T</a></li>
        <li><a class="active" href="journal.html">📚 Journal</a></li>
        <li><a href="share_calculator.html">🧮 Calculator</a></li>
        
      </ul>
    </nav>
  </header>

  <main class="container">
    <h1>Portfolio Management System</h1>
    <p class="subtitle">Allowed date range: March 25, 2026 to today (no past/future dates).</p>

    <section class="card section">
      <div class="toolbar">
        <div>
          <h3 id="journalDate" style="margin:0;"></h3>
          <input id="journalDatePicker" type="date" />
          <div class="save-indicator" id="journalSaved">Saved ✓</div>
        </div>
        <div class="journal-nav">
          <button id="prevDay" class="btn-secondary" type="button">← Back</button>
          <button id="nextDay" class="btn-secondary" type="button">Forward →</button>
        </div>
      </div>
      <div class="journal-prompts">
        <label class="journal-field">
          <span>1. What I learned today:</span>
          <textarea id="journalQ1" class="journal-textarea" placeholder="Write what you learned today..."></textarea>
        </label>
        <label class="journal-field">
          <span>2. What I assumed without proof:</span>
          <textarea id="journalQ2" class="journal-textarea" placeholder="Write assumptions you made without proof..."></textarea>
        </label>
        <label class="journal-field">
          <span>3. Where I was overconfident:</span>
          <textarea id="journalQ3" class="journal-textarea" placeholder="Write where overconfidence showed up..."></textarea>
        </label>
        <label class="journal-field">
          <span>4. Where I doubted myself unnecessarily:</span>
          <textarea id="journalQ4" class="journal-textarea" placeholder="Write where unnecessary doubt appeared..."></textarea>
        </label>
        <label class="journal-field">
          <span>5. Emotional triggers I noticed:</span>
          <textarea id="journalQ5" class="journal-textarea" placeholder="Write emotional triggers you noticed..."></textarea>
        </label>
        <label class="journal-field">
          <span>6. One thing I did well:</span>
          <textarea id="journalQ6" class="journal-textarea" placeholder="Write one thing you did well..."></textarea>
        </label>
        <label class="journal-field">
          <span>7. One thing I will improve tomorrow:</span>
          <textarea id="journalQ7" class="journal-textarea" placeholder="Write one thing to improve tomorrow..."></textarea>
        </label>
      </div>
    </section>
  </main>

  <script defer src="trade-math.js"></script>
  <script defer src="capital-manager.js"></script>
  <script type="module" src="firebase-sync.js"></script>
  <script defer src="data-recorder.js"></script>
  <script defer src="journal.js"></script>
</body>
</html>
