<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trades | Portfolio Management System</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .container { max-width: 1100px; margin: 0 auto; }
    .section { margin-top: 20px; }
    .trade-form {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      align-items: end;
    }
    .trade-form label { display: flex; flex-direction: column; gap: 6px; font-size: 0.9rem; }
    .trade-form input {
      background: #101826;
      border: 1px solid #334;
      color: #fff;
      border-radius: 6px;
      padding: 10px;
    }
    .btn-primary, .btn-danger {
      border: none;
      border-radius: 6px;
      padding: 10px 12px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary { background: #ffd700; color: #111; }
    .btn-danger { background: #c0392b; color: #fff; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th, td { border-bottom: 1px solid #333; padding: 10px; text-align: left; }
    .message { margin-top: 10px; color: #9ad38b; min-height: 1.2rem; }
    .error { color: #ff7b7b; }
  </style>
</head>
<body>
  <header>
    <nav>
      <div class="logo">Portfolio Management System</div>
      <ul>
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="trades.html">Trades</a></li>
        <li><a href="longterm.html">Long Term</a></li>
        <li><a href="mf.html">SIP System</a></li>
        <li><a href="pasttrades.html">Past Trades</a></li>
        <li><a href="journal.html">Journal</a></li>
        <li><a href="share_calculator.html">Share Calculator</a></li>
      </ul>
    </nav>
  </header>

  <main class="container">
    <h1>Trades (Firebase Realtime Database)</h1>

    <section class="card section">
      <h2>Add Trade</h2>
      <form id="tradeForm" class="trade-form" autocomplete="off">
        <label>Stock Name
          <input type="text" name="stockName" required />
        </label>
        <label>Buy Price
          <input type="number" name="buyPrice" min="0" step="0.01" required />
        </label>
        <label>Quantity
          <input type="number" name="quantity" min="1" step="1" required />
        </label>
        <label>Stop Loss
          <input type="number" name="stopLoss" min="0" step="0.01" required />
        </label>
        <label>Target
          <input type="number" name="target" min="0" step="0.01" required />
        </label>
        <label>Date
          <input type="date" name="date" required />
        </label>
        <button type="submit" class="btn-primary">Save Trade</button>
      </form>
      <p id="statusMessage" class="message" aria-live="polite"></p>
    </section>

    <section class="card section">
      <h2>Saved Trades</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Stock Name</th>
              <th>Buy Price</th>
              <th>Quantity</th>
              <th>Stop Loss</th>
              <th>Target</th>
              <th>Date</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="tradesTableBody"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script type="module" src="trades-firebase.js"></script>
</body>
</html>
